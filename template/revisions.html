<!DOCTYPE html>
<html dir='ltr' lang='en'>

<head>
    <title>{{name}}</title>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0, interactive-widget=resizes-visual' />
    <link rel='icon' href='icon-192.png' type='image/png' />
    <link rel='stylesheet' href='builder.css?{{v}}' />
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src='builder.js?{{v}}'></script>
</head>

<body>
    <div class="container">
        <div class="header editable" data-load="site" data-page="{{page}}" data-sort="{{sort}}">
            <div class="header-left">
                <div class="site-name" >View a previous revision</div>
            </div> 
        </div>
        <div class="title editable" data-load="page" data-page="{{page}}">{{title}}</div>
        <div class="sections">
            {{sections}}
        </div>
    </div>
    <div class="footer">{{footer}}</div>
</body>

</html>
