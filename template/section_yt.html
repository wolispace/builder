<a name="{{section}}"></a>
<section class="section section-yt editable section-background-{{background}}" data-load="section" data-page="{{page}}" data-section="{{section}}">
    <div class="date">{{date}}</div>
    <div class="intro">{{intro}}</div>
    <div class="yt-wrapper {{hidable}}">
        <iframe
            src="{{content}}"
            width="100%"
            height="100%"
            frameborder="0">
        </iframe>
    </div>
</section>
